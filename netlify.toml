[build]
  publish = "_site"
  command = "echo 'Pre-built site, no build needed'"

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Immutable cache for Quarto's hashed assets (CSS, JS, fonts)
[[headers]]
  for = "/site_libs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long cache for post images (never change after publication)
[[headers]]
  for = "/posts/*/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long cache for PDFs and static data
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for HTML pages (updated on redeploy)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
